<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Management System</title>
    <style>
        /* CSS Embedded inside HTML */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #090d16;
            color: #f1f5f9;
            margin: 0;
            padding: 30px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 30px;
            border-bottom: 1px solid #1e2937;
            padding-bottom: 15px;
        }
        h1 { color: #38bdf8; margin: 0; font-size: 28px; }
        p.subtitle { color: #64748b; margin: 5px 0 0 0; font-size: 14px; }
        
        /* Metric Summary Dashboard cards */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .metric-card h3 { margin: 0 0 10px 0; color: #94a3b8; font-size: 13px; text-transform: uppercase; }
        .metric-card .value { font-size: 28px; font-weight: bold; color: #f8fafc; }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
        }
        @media (max-width: 850px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .panel {
            background-color: #111827;
            border: 1px solid #1f2937;
            padding: 25px;
            border-radius: 12px;
            height: fit-content;
        }
        h2 { margin-top: 0; font-size: 18px; color: #38bdf8; border-bottom: 1px solid #1f2937; padding-bottom: 10px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: #94a3b8; font-size: 13px; }
        input, select {
            width: 100%; padding: 10px; background-color: #090d16;
            border: 1px solid #374151; color: white; border-radius: 6px;
            box-sizing: border-box; outline: none; font-size: 14px;
        }
        button {
            width: 100%; padding: 12px; background-color: #38bdf8;
            color: #090d16; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; font-size: 14px; transition: background 0.2s;
        }
        button:hover { background-color: #0ea5e9; }

        /* Data table design components */
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%; border-collapse: collapse; text-align: left; font-size: 14px;
        }
        th, td { padding: 12px; border-bottom: 1px solid #1f2937; }
        th { color: #94a3b8; font-weight: 600; text-transform: uppercase; font-size: 12px; }
        tr:hover { background-color: #1f293740; }

        .badge {
            padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;
        }
        .bg-engineering { background-color: #0369a1; color: #e0f2fe; }
        .bg-design { background-color: #701a75; color: #fdf4ff; }
        .bg-marketing { background-color: #15803d; color: #f0fdf4; }

        .action-link {
            color: #ef4444; cursor: pointer; text-decoration: underline; font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Internship Management Portal</h1>
            <p class="subtitle">Track corporate onboarding pipelines, team alignment, and candidate documentation profiles.</p>
        </header>

        <div class="metrics-grid">
            <div class="metric-card">
                <h3>Total Active Interns</h3>
                <div class="value" id="totalCount">0</div>
            </div>
            <div class="metric-card">
                <h3>Engineering Track</h3>
                <div class="value" id="engCount" style="color: #38bdf8;">0</div>
            </div>
            <div class="metric-card">
                <h3>Design Track</h3>
                <div class="value" id="designCount" style="color: #f472b6;">0</div>
            </div>
        </div>

        <div class="main-layout">
            <div class="panel">
                <h2>Onboard New Intern</h2>
                <form id="internForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="e.g., Brandon Stark" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Contact Email</label>
                        <input type="email" id="email" placeholder="e.g., bstark@corporate.com" required>
                    </div>
                    <div class="form-group">
                        <label for="department">Department Alignment</label>
                        <select id="department">
                            <option value="Engineering">Engineering</option>
                            <option value="Design">Design</option>
                            <option value="Marketing">Marketing</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="duration">Duration Period</label>
                        <select id="duration">
                            <option value="3 Months">3 Months</option>
                            <option value="6 Months">6 Months</option>
                        </select>
                    </div>
                    <button type="submit">Deploy Intern Profile</button>
                </form>
            </div>

            <div class="panel table-container">
                <h2>Active Intern Database Registry</h2>
                <table id="internTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Department</th>
                            <th>Duration</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="systemEngine.js"></script>
</body>
</html>
